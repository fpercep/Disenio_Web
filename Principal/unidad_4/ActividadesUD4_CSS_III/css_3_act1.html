<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .container {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            background-color: #f0f0f0;
            padding: 10px;
        }
        .item {
            background-color: steelblue;
            color: white;
            text-align: center;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="item">Guardar</div>
    <div class="item">Editar</div>
    <div class="item">Eliminar</div>
    <div class="item">Cancelar</div>
</div>
</body>
</html>
