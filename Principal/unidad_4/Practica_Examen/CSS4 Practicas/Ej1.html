<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Web corporativa</title>
  <style>
      .layout {
        display: grid;
          grid-template-columns: 250px 1fr;
          grid-template-rows: 80px 1fr 60px;
          grid-template-areas: "header header" "menu content" "footer footer";
          gap: 15px;
          place-items: center;
      }

      .header {
          grid-area: header;
      }
      .menu {
          grid-area: menu;
      }
      .content {
          grid-area: content;
      }
      .footer {
          grid-area: footer;
      }
  </style>
</head>
<body>

  <div class="layout">
    <header class="header">Header</header>
    <nav class="menu">Menú lateral</nav>
    <main class="content">Contenido principal</main>
    <footer class="footer">Footer</footer>
  </div>

</body>
</html>
